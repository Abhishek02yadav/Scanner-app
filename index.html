<!DOCTYPE html>
<html>
<head>
  <title>Ficokart Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    #reader {
      width: 320px;
      margin: auto;
    }
    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📷 Ficokart Scanner</h2>

<div id="reader"></div>

<br>

<button onclick="startScanner('environment')">Back Camera</button>
<button onclick="startScanner('user')">Front Camera</button>
<button onclick="stopScanner()">Stop</button>

<h3>📦 Scanned Items</h3>
<table border="1" align="center">
  <thead>
    <tr>
      <th>Barcode</th>
      <th>Item Name</th>
      <th>Qty</th>
    </tr>
  </thead>
  <tbody id="scanTable"></tbody>
</table>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

let html5QrCode;
let scannedSet = new Set();

// 🔥 AUTO START
window.onload = function () {
  startScanner('environment');
};

// 🔥 START SCANNER
function startScanner(cameraType) {

  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      startNewScanner(cameraType);
    }).catch(() => {
      startNewScanner(cameraType);
    });
  } else {
    startNewScanner(cameraType);
  }
}

// 🔥 NEW HELPER FUNCTION
function startNewScanner(cameraType) {

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: cameraType },
    {
      fps: 10,
      qrbox: { width: 300, height: 120 },
      aspectRatio: 1.0
    },
    onScanSuccess,
    onScanError
  ).catch(err => console.error("Start Error:", err));
}

// 🔥 STOP SCANNER
function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop()
      .then(() => {
        html5QrCode.clear();
        html5QrCode = null;
        console.log("Scanner stopped");
      })
      .catch(err => console.error(err));
  }
}

// 🔥 SCAN SUCCESS (FIXED WITH JSONP)
function onScanSuccess(decodedText) {

  if (scannedSet.has(decodedText)) return;
  scannedSet.add(decodedText);

  document.getElementById("beep").play();

  console.log("Scanned:", decodedText);

  // ✅ ONLY THIS (NO fetch, NO script, NO JSONP)
  const salesURL = "https://script.google.com/macros/s/AKfycbxQcqj_RVJsp8427u49Tk06_qK5eAUuO0KvJTvhMtJASwhhgVpL9dqy71C4ZZf7H1Ta/exec";

  window.location.href = salesURL + "?barcode=" + decodedText;
}

// 🔥 HANDLE API RESPONSE
function handleResponse(product) {

  console.log("Product:", product);

  if (!product || !product.name) {
    alert("❌ Product not found");
    return;
  }

  addToScanTable(product);

  // 🔥 SEND TO SALES PAGE
  if (window.opener && window.opener.addRow) {
    window.opener.addRow(product);
  } else {
    console.log("Sales page not connected");
  }
}

// 🔥 IGNORE ERRORS
function onScanError(error) {}

// 🔥 ADD TO TABLE
function addToScanTable(product) {

  const table = document.getElementById("scanTable");
  let rows = table.querySelectorAll("tr");

  for (let row of rows) {
    if (row.cells[0].innerText == product.barcode) {
      let qtyCell = row.cells[2];
      qtyCell.innerText = parseInt(qtyCell.innerText) + 1;
      return;
    }
  }

  let row = table.insertRow();

  row.insertCell(0).innerText = product.barcode;
  row.insertCell(1).innerText = product.name;
  row.insertCell(2).innerText = 1;
}

</script>

</body>
</html>
