<!DOCTYPE html>
<html>
<head>
  <title>Ficokart Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #reader { width: 300px; margin: auto; }
    button { padding: 10px; margin: 5px; }
  </style>
</head>

<body>

<h2>📷 Ficokart Scanner</h2>

<div id="reader"></div>

<br>

<button onclick="startCamera('environment')">Back Camera</button>
<button onclick="startCamera('user')">Front Camera</button>
<button onclick="stopScanner()">Stop</button>

<h3>📦 Scanned Items</h3>
<table border="1" id="table">
  <tr>
    <th>Barcode</th>
    <th>Item Name</th>
    <th>Qty</th>
  </tr>
</table>

<script>
let scanner;

function startCamera(mode) {
  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: mode },
    { fps: 10, qrbox: 250 },
    (barcode) => {
      console.log("Scanned:", barcode);

      google.script.run.withSuccessHandler(function(item) {
        if(item) {
          addRow(barcode, item.name);
        } else {
          alert("Product not found");
        }
      }).getProductByBarcode(barcode);
    }
  );
}

function stopScanner() {
  if (scanner) {
    scanner.stop();
  }
}

function addRow(barcode, name) {
  let table = document.getElementById("table");

  let row = table.insertRow(-1);
  row.insertCell(0).innerText = barcode;
  row.insertCell(1).innerText = name;

  let qtyCell = row.insertCell(2);
  let input = document.createElement("input");
  input.value = 1;
  qtyCell.appendChild(input);
}
</script>

</body>
</html>
